services:

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "21434:11434"
    entrypoint: >
      sh -c "
        ollama serve &
        until ollama list 2>/dev/null; do sleep 1; done &&
        ollama pull qwen2.5-coder:3b &&
        ollama pull nomic-embed-text &&
        wait
      "
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q qwen2.5-coder:3b && ollama list | grep -q nomic-embed-text || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  api:
    build:
      context: server
    image: memorie-api
    ports:
      - "8080:8080"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_URL=http://ollama:11434
    restart: unless-stopped

volumes:
  ollama_data:
